front:
  text: 太上老君混元三部符卷上潔四
  hash: sha256:d3962194d6a7974d8c462b51d1353bc709984cf6662d1cd8e1d9453ff4f83c57
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0054_SJB_001-110644a, image: sjb/11/110644a.png}
body:
  text: 目録都匠符解穢符安宅符辟土氣符移徙符辟火符止魖耗符田種符利蠶符死䘮咎疰符百恠符十二時地符都匠符三道凡書三部符及一切符同用上符印印諸符觧穢符十一道二符皇老解殗行符時先吞之符納水中漱一本作納水中飲之大神清明吉三符有穢者東向再拜吞女人殗穢之火古吞之大吉解污止穢水吞下去身著水中洗中一切諸惡殗殗手而吉穢令人大吉朱書紙上東向再拜吞并安水中沐浴解百穢安宅符三十一道門户上中庭上宅西北角宅西南角上吉朱書桃板上鎮宅四角吉安宅東南角吉安宅東北角大吉東方青帝符音屬角駕青龍王木利宅出入稱心如意主春三月宜五榖安宅十二神宜蠶朱書桃板鎮東方令人家消災吉南方赤帝符音屬徵利宅駕赤龍主夏三月朱雀青書白板鎮南方宜蠶吉消災火辟口舌萬惡安宅吉西方白帝符音屬商乘白龍利宅主秋三月及宅中十二神令人吉昌白虎秋三月朱書板上鎮西方宜六畜辟五兵北方黑帝符音屬羽神勾陳從玄武利百神辟水母主冬三月所求遂意大吉玄武青書板上鎮北方辟瘟賊驚恐除凶媚大吉中央黃帝符音屬宮神利宅攝四方吉昌除凶咎安宅十二神勾陳主收四季家有妬鬼惡神朱書黃板上鎮中庭辟八方土氣中庭露吉神符斷絶某家先亡死鬼男傷女卒山五酉五丑古鬼皆不得干歷符中若有干者將請都市斬之安宅厭百鬼安之大吉屋柱下有害鬼欲賊人白素刺懸柱下十日鬼即滅利宅辟鬼書貼門户上大吉符鎮新宅安七神今益人口富貴以桃板書著屋四角外大吉天婁星符土宅中新故妖惑之精下符係神星符收宅中惡鬼書和上法利牛馬斷疾病辟耗亡保財利戶上吉利奴婢書門户上吉老子神符主殫凶宅尸惡鬼疰殺盡滅神之章此符主凶宅印封之二符安宅利宅懸堂窗上利宅符貼門上二符安東門上吉安西門上吉祭酒籙生治壇上懸之辟禍殃除邪鬼氣懸門户吉辟災害五寸板懸北堂中梁上及門户上大吉辟土炁符二十九道四方土氣蓋屋梁妨女人書之吉四方起土丹書白上貼屋頭向之吉中央土炁書左脇上不之亦大吉東方起土太白代之南方起土辰星代之中央起土歲星代之西方起土火星代之北方起土土星代之厭土符庚辛日懸門户上亦可吞之大吉猒西方起土作舍吉書黃石鎮子上黄石丑上白石寅上白石卯上白石辰上黑石巳上黑石午上黑石未上赤石申上赤石酉上赤石戌上黃石亥上四方土氣書面向之四方土氣書四壁上三符主土氣者門户上大吉符主新入舍四方興起土土之精氣見符不妄害良善闊四寸木長一尺二寸書懸中庭吉二符上符辟土帶之下符太歲還食人又於歲大將軍諸忌上起土作宅書於白板隨方面箸土中令字向之辟土符若他人起土葬埋動土在人刑害上令人喪疾病官事憾轲者以起土及造屋日朱書白素貼門戶上及中庭使出屋日三尺土氣還白食不爲害懸壁田蠶萬倍吉起土造宅葬埋在人刑害之上令人喪禍疾病懸宮口舌以起土日朱書素上著門戶上及中庭書出屋三尺則土氯不敢爲害移徙符三道三符初移徙人人帶之吉吞之辟土氣老子日受符謂人嫁娶夜葬移徒皆還其命被服此符生氣歸之不宜書素佩之長生辟火符十道四激日朱書懸舍角上吉墨書四壁辟火墨書著北璧向南方吉人家年年失火是爲火注此符著竃上大吉辟火注書著堂中及竃下左右有火起把之自滅亦辟惡鬼五兵太上治印之用白章印之吉主備火書四壁辟火光青書白板上懸門户上大吉東海使者自名雨格軀長千丈頭廣百尺以江作家以海爲宅呼吸噓氣吐水萬石火精聞之入地百尺東井蔽之西井諾諾急急如律令東海使者自禹伯身長千丈頭長三尺呼吸之間吐水萬石火精聞之入地百尺止魖耗符三十二不利奴婢喜逃亡財物不聚謹移文白刺如律令亡物書白素著失處以衣覆之三日自得奴婢逃亡盜賊朱書白紙裹之覆書紙上與奏同文懸井中不求自得主厭盗賊丧禍朱書著心前衣領中大吉亡物奏書著失處以甑覆上勿與人語三日自得亡物書奏著失處自得家不冝猪羊死病係之封以督害之印厭六畜自死符著死處大吉馬中惡書地上令卧其上二符著盜處甑覆之不逐自來牛馬卒腹脹吞之吉牛馬腹脹吞之牛馬頭上逐疫鬼馬帶之吉牛馬病帶之牛馬驚帶之二符牛馬中惡吞之牛馬病貼門上牛馬病貼門上上三符牛馬腹服吞之吉此符牛馬驢頭上帶之大吉牛病丹書桃板户上或牛頭上吉著機勝殺百鬼大吉符主機綕上田種符八道鼠食稻蟲鼠食暴禾稼置田中央蝗蟲食稻書桃板厭之吉某里域社稷四野五野七野都具姓某種田物在都界爲某某所食害符到約勒即時罷絶以爲效信善言被符時來行不得有返息急如律今某年月日時起山精地主不得犯男女民某家榖如太玄都律令上二符鼠食稻苗等符置田角四處中央下符蟲鼠食殺苗田四角麤䑕暴穀稼置田四角朱書桃板長一丈懸髙七尺勿反顧之田中符書四方木著田中央利蠶符三十道蠶大食箔上吉蠶不蕃息懸堂中大吉蠶生蠶户上吉蠶不資息死傷符户上及箔上大吉三符鼠噉蠶書貼蠶屋内四壁上利蠶貼箔上二符上符貼蠶室下符蠶母佩之東方女貞利蠶南方女陽利蠶西方女傾利蠶北方女成利蠶中央女黃利蠶蠶室四角飬蠶人佩之厭不蠶市賈不利除殃凶吉老子利蠶萬倍著北壁上與人腰等大吉符主簇中大吉蠶户上亦人佩之天六合符兵星子日星陽破軍星生利蠶蠶户上大吉辟邪著伐符主簇北頭大吉符主簇南三月上寅日作蠶符以其頭大日著屋中璧上諸是蠶吉符皆用此日作之大吉死䘮咎疰符三十五道主四方有咎疰入人家欲家欲害謹移文白刺上懸四璧中央七日鬼疰自死厭左右卒有死者懸符於中庭宅門上大吉三符宅中有丧疰咎不出書桃板懸四角即出除殃厭四鄰死喪殃疰著門上丧家人人佩之或貼户上厭死亡雄雌不出懸門户上吉厭人死著符亡人手中不復連也宅有死喪咎疰不出書桃板著四角主四隣有䘮斬鬼殺疰書素頭髻中凡人家中有死貼户上吉殃咎疰不出書貼屋四角咎疰不出書懸堂上辰戌日死者鬼名天神北斗七星知鬼姓名神尚天牢百鬼不當急急如律令巳亥日死者鬼名天神北斗知鬼主名黄神越章百鬼皆亡急急如律令子午日死者鬼名天賊北斗七星知鬼姓名黄神越童仲由夜光門丞户尉討鬼不祥急急如律令丑未日死者鬼名天收北斗七星知鬼姓名黄神越章厭鬼之光天門四通百鬼滅蹝急急如律令寅申日死者鬼名天理北斗七星知鬼主名天帝神符蜚尸滅除三台熒惑百鬼皆歛急急如律今上三符却殺四隣有死書向人貼户上大吉上三符與前三符同用却殺四隣有死書之吉神符殺鬼佩帶并安户上符主客亡咎疰不岀貼宅四角四方咎疰入人家剌懸四壁上送喪符佩之吉葬日朱書四符一尺二寸橫棺上死婦來病夫及宋中外死婦不葬者辟除凶殃如律令書素兩當中死夫來病婦及宗中亂死不葬者辟除凶殃如律令書兩當中猒百恠符五十三道百恠書著䆴上貼吉百恠符貼門上吉宅中居不吉多見恠妄起書貼向之二符厭百恠符厭萬百恠随所在三真世用斬凶鬼恠妖變數起百物變化所見非常書貼向之有恠變家長佩之言子日見恠丑日見恠寅日見恠卯日見恠辰日見恠巳日見恠午日見恠未日見恠申日見恠酉日見恠戌日見恠亥日見恠犬恠符主上床卧符厭之吉主犬上床書符著生處吉符主犬上宋著門上床上吉主犬嘷啼縮鼻著符門上大吉主犬縮鼻著宅中央主犬縮鼻此符猒之主犬上屋符著門户上吉主犬無故居人䆴上卒尿厭之主犬無故戴人甑器物書符門户及䆴上主豬生自食其子家有禱事不解故急祠祀厭之主犬上屋符置門户上吉犬上床死門户上吉犬上屋四望著戌地上吉二符犬上床貼門户上吉犬上床著本處吉犬嘷著符戌上吉犬視井著井上犬嘷宅中著堂中言犬起止床上著處及狗血污人書桃板安恠處及户上犬上床衣履向之吉犬上床眠妨主貼著卧處及户上犬上床及穢傷萬恠封以北斗印犬戴人衣服之類著處吉犬嘷向之火上竈著處犬視井向之吉犬上床著上處犬向主縮鼻著户上犬起堂上貼犬作恠書三寸桃板著恠處䑕恠符一十九道䑕恠䑕鳴堂内符懸著中䑕鳴處家中及堂内左右走鳴符厭之吉鼠咋人衣符厭之吉䑕作伏鷄鳴符著鳴處神符置坑中今䑕臰䑕咋人及畜貼向之䑕咋人衣冠幘書向之吉䑕咋人血出帶之鼠咋書箔上䑕作伏雞鳴符著怪處并堂上䑕咋人絲織符大吉䑕傷人宅好地積壞宅不安貼户上厭䑕鳴著帳四角吉二符上䑕作伏鷄鳴著處下符䑕食人衣書素衣領中多鼠厭之隱䑕入人家屋舎耕田地擾物貼符恠處䑕咋人手足書四寸桃板左臂係鬼字厭之隐䑕耕人地門户上以符著處厭之鬼恠符一十九道二符鬼斷人髪上符吞亦佩下符桃板懸門上鬼髠人頭名曰精死鬼揺人門户著揺處鬼搖人床著午上吉鬼盗人衣符門户上大吉鬼夜呼人著門户上鬼陳没人杯案著門户上鬼推人壁著推處吉鬼聚血在人室中著門戸上吉人卒見鬼著門戸上大吉鬼嘷人怖不安著戸上井竈衣衿中四符鬼呼人名上二符書桃板懸户中下符吞又主鬼駿吞之大吉主鬼無故開閉人門戸符著門上吉鬼開入門符安户上吉宅中聚鬼書符厭之大吉蛇恠符七道蛇無故入人門戸以符厭之大吉蛇入人家中符著門户上大吉符從天上來神師行之月豪蛇之恠六十日至從去萬里急急如律令主蛇怪除山精蛇入室赤青白黒色皆有憂黄色吉符厭之大吉蛇入䆴符著恠處吉二符蛇作一切恠安見處大吉利狐恠符十道主狐鳴毛蟲向之斷之以符向之吉野蟲及狐鳴或入人家屋宅中及樹上書懸竿頭大吉狐鳴書桃板以符向之鳴處狐鳴消滅凶殃桃板向之吉符准上符厭之狐鳴丹書刀上向之大吉狐鳴書桐板向鳴處大吉狐鳴書桃板門戸上吉狐鳴驚天關地户北斗七星飲狐血急急如律令符去萬里恠著鳴處即死大吉符主狐及鳥飛入人家書厭之吉太上老君混元三部符卷上
