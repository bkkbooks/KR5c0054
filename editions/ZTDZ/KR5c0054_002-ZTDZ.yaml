front:
  text: 太上老君混元三部符卷中潔五
  hash: sha256:a9090371c6a8f85e1151e33c24c66de71d9704252cd5dc78336ccdff7228896e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0054_SJB_002-110656c, image: sjb/11/110656c.png}
body:
  text: 目録百恠符護身符捍厄符鷄恠符十一道鷄自死厭之大吉雌鷄雄鳴著門户上大吉鷄夜驚著栖下大吉雌鷄雄鳴於夜者急殺鷄懸符門户上吉雞无故入井死厭之吉雌鷄雄鳴殺鷄貼符門戸吉鷄无故鳴於夜者符貼門户上吉二符鷄无故飛散不安栖書符貼門户上吉鷄夜鳴有急事不出三十日厭之書恠處及户上吉井恠符四道井沸投之吉龍在井中向之大吉井沸書符厭之大吉釡恠符五道釡鳴著竈上吉釡鳴用五寸桃板書著釡中吉釡鳴書素箸釡中炊氣不出火自滅書貼門戸上言且炊不蒸火自滅符厭吉百鳥恠符二十三道鵂鶹鴝鵒无故集鳴宅中符厭之吉鵂鶹鳴宅舎符貼門尸上吉鵂鶹鳴向之吉鳩鴿鳴入間舍左右禹步書遣徃即死鳩鴿集人家符著處吉鳩鴿鳴書恠處野鳥無故入人家符貼門户上及恠處飛鳥屎著人帶之吉鳥入人家符書户上吉鳥鵲恠符向之吉鵂鶹豺狼虎豹呌喚符向之吉鵂鶹狐鳴笑屋宅上以符書門户上大吉群鳥入人家以符厭之大吉鵂鶹笑符貼門户上吉鵂鶹鳴笑入人家甲乙日憂官以符貼其處吉雉入人家及飛屋上此二符安恠處及門上吉厭老鴟土梟山鵲恠符厭老鳥鳩鴿恠符厭鷹鶚鴝鵒恠符厭慱勞鷯鶉恠符厭野雀鵝鴨百鳥恠符百鳥野禽入人家以符安恠處及門户上吉蜘蛛蟲蟻符二道聚蟻入人家符安恠處大吉蜘蛛綱人門户主之大吉旋風符二道旋風入人家吹人衣物發屋折木符安恠處吉廻風入人家以符貼門户上吉龍虹恠符七道龍栖人家樹上及屋中符厭吉龍入井中家主凶以符書井上吉龍入井以符厭之吉厭龍入人家及一切龍恠符大吉晴虹在人井中符安井上及門户大吉晴虹入井飲水符安井上及户上吉見蛟螭老家敗入非身病死佩符吉諸雜異恠符十二道行來出入卒有異血不利事以符安恠處大吉家忽有異血汚衣服器物以符禳之大吉兎入人家以符安恠處大吉弓箭刀杖作聲自反自張恐賊至以符厭之吉人家宅中有音聲精光一切恠書門戸一吉宅中光恠符安門戸上吉鬼火暁人家符主之大吉人家屋宇无故有飛蜂蛾蟻門户上安符吉人宅舍卒有音聲符安恠處及門户上吉宅中音恠符安門戸上及恠處吉宅中卒有光恠符安恠處及門上吉野獸異蟲不可識物入人家符安門上大吉六畜恠及諸恠符二十四道厭猪火恠上二符六畜自死及不息孳以符禳之大吉猪生還食其子符書門户上吉人家六畜生子自食禳之吉一云猪生子自食符厭之吉人家樹木六畜禾稼百物自死以符禳之吉人家樹木無故死符著樹上禳之吉六畜死著未地吉漢式帝宫中有犬恠西王母令以著四壁上除殃吉上二符蠅蜂入人家書壁上吉門戸無故自開閉以符厭之吉人見異血符著其處吉狸食雞書符著栖下并籬四角吉上三符見恠朱书白素男左女右帶之大吉人家忽見火光符貼門户上并恠處吉人家光照宅舍鬼火中毁器用不廢茂盛五殺家有流血之憂符厭之大吉光恠貼門户上吉厭蜘蛛無故聚網人家恠恠鳥入人家鳴此符著四壁禳之吉人家卒有聚蟻成行著其處吉迥風入人家符貼門戸上吉正月破器書門戸上吉四季符四道靑龍符春三月百恠以符厭之大吉朱雀符夏三月百恠厭之大吉白虎符主秋三月百恠禳之吉玄武符主冬三月一切恠禳之人吉十二日辰見恠符二十三道子日見恠主驚恐盜毗水火亡遣財物五十日至以符厭之安恠處及門戸上大吉丑日見恠主憂牢獄疾病其咎下出五十日至以符安恠處及門戸上厭之吉寅日見恠慎口舌憂縣官疾病不出九十日至書貼恠處大吉卯日見帳戒口舌官符等事疾病九十日至符貼恠處及門户上吉辰日見恠憂官事及小口宅有丧不出十日書符貼恠處大吉巳日見恠小口病口舌從外來神不安不出五十日書符安恠處大吉午日見恠憂水火重病必死令人厄及先祖口舌不出三十日禳之吉未日見恠疾病至死不出十日以符於恠處及門户上貼之吉申日見恠縣官収捕事不出七十日至書符恠處及門上酉同用此符戌日見恠宅舍不安戒死亡汙大人不吉當病口舌多事慎忌縣官恐女子憂不出十日以符向之大吉亥日見恠水火驚恐卒急事憂病與人相爭慎勿言問縣官不出五十日見之以符安恠處吉子日見恠朝害家長暮害小口不出六十日墨書素上懸屋四角及恠處門户上大吉丑日見恠朝害長子暮害兄并婦女妊娠凶不出六十日墨書白素安屋四角及厠上禳之吉寅日見恠朝害中子暮害母一云小口若官吏六畜凶不出六十日至符安恠處及門井碓磨板上上書之吉卯日見恠朝妨婦女暮害六畜以符書絳上著門户眉兩邊及屋四角禳之則吉辰日見恠朝遠行暮妨中子一云父母六畜書絳貼屋四角及門户兩邊吉巳日見恠朝害家主暮妨小口書絳貼堂四壁上大吉午日見恠朝害中男暮妨婦女一云朝害婦暮害父母不出百日書絳安厠上吉未日見恠朝害婦女暮妨小口一云妨父母書布著屋四角又書布懸圊厠上大吉申日見恠朝害姙娠婦女暮害六畜財物一云朝子亦云小口不岀八十日書白素貼屋四角門戸上吉酉日見恠朝妨長男暮害小口書害婦及失火暮妨父母憂縣官不出六十日書東南屋四壁及井碓吉戌日見恠朝妨家長暮害小口朝姙娠婦女暮女不出八十日書符置厠屋及四壁門戸上大吉亥日見恠朝害家長暮害姙婦一云朝妨兒女書母暮小口失火書布堂上四壁上大言十二時地符十六道老君神符主收録山鬼之精詐稱天官收付九天之獄急急如律令老君神符主收録下土山鬼六君血食妖滛歌舞縱意收付北辰獄斬之急急如律令老君神符主收録死䘮復連死注不絶虎狼傷子遊走下上之鬼收付天帝獄斬之急急律令老君神符主收録天地鬼神水火死之鬼及傷刑殁之屬收付比斗獄斬之急急如律令老君神符主收録老精妖魅故王侯𩳀五酉火死傷子之精収付南斗獄斬之急急如律令老君神符主收録家鬼復注生人不絶之精亂鬼之傷收付太山獄斬之急急如律令老君神符主收録深水之精水中魑魅傷鬼之屬收付東海獄斬之急急如律令老君神符主録溺水傷死之鬼収付河伯獄斬之急急如律今老君神符主收録墳墓之精高山之靈五傷之鬼收付丘丞獄斬之急急如律令老君神符主收録男𦍙女𦍙之鬼收付平澤獄又言皐陶獄斬之急急如律令老君神符主收録犯法故吏戮死傷鬼收付律令獄斬之急急如律令老君神符主收録市死傷之鬼收付都市獄斬之急急如律令老君神符主收録四十九天犯法鬼神收付自然獄斬之急急如律令老君神符主收録五十天獄犯法鬼神收付虛无獄斬之急急如律令老君神符主收録四十九天獄犯法鬼神收付四十九天獄斬之急急如律令老君神符主收録土中伏銅衆老之精沉才之木金銀銅鐵死龍腐骨萑石宅中䝜靈之精收付无差重冥之獄斬之急急如律令右十六符用桃板長一尺六寸作印室封之朱符墨書太上治獄字下識皆先上章訖安十二時地符於本方位上護身符四十五道仙人護身保命神符朱文安心上大吉利大護身保命神符朱書安心上所在分野社令天地神祇五嶽四瀆十二河源上地靈祇來朝集營衛護身保命佩大吉朱文安於心上立即得靈祇護身保命亦得福祐大吉利朱文安心上其功用同上大吉巳上九符朱書安心上立得福祐保護身命增年益筭大吉天帝釋符佩之護身大吉利孩子護身符王公及二千石護身符朱文安心上仙人護身保命符奴婢護身保命符二千石巳下朱文安心上及佩之大吉護身朱文安心上惡鬼惡神走萬里辟精魅萬恠大吉利朱文安於心上護身保命得福祐敬重如見太上朱文安心上及帶之福祐朱文安心上吉朱文安心上辟百鬼符上有斗安人強健吉朱文安心上辟百邪人所求皆悉稱意吉巳上十七符朱文安心上護身合福祐大古利朱文安心上護身保命令人長命行山林得安寧過世除罪咎捍厄符一十九道貪狼定志星五子捍厄長存符以白囊係肘大吉捍厄佩之鎮星五丑捍厄洞達威喜吉祐長存符以朱書白袋左肘係大吉天一捍厄天生五寅長存符以絳囊肘係大吉五卯捍厄主拘左魂留右魄長存符以青袋佩男左女石大吉天有五捍厄長存符以黃袋係肘男左女交大吉利五巳捍厄制萬邪除灾妖長存符以緋袋佩男左女右大吉求相勝却六害氣天生五午捍厄長存符以丹書絳袋佩肘後吉著生籍來吉祥天蓋五未捍厄長存符以黄袋係臂上大吉五神佐蓋年命天檢五申捍厄長存符以白袋係臂大吉禄存星天牧五酉捍厄長存符以白袋盛男左女右佩大吉六雷助檢六宫天牧五戌捍厄長存符以黃袋係臂大吉長生符以白袋盛係左肘大吉度日厄帯之吉度歳厄佩之吉太上老君延年益壽度月厄符男左女右佩帶吉此二符度一切厄佩之大吉老君捍厄六甲陽符辟兵係胷前吉太上老君混元三部符卷中
