front:
  text: 太上老君混元三部符卷下潔六
  hash: sha256:527767255809c612228df9c294dd05b485e2f6ff0e8addccd441777b74e7dbb8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0054_HFL_003-001a, image: hfl/0353/0353-059.png}
body:
  text: 目録延年符辟鬼符安魂符斷惡夢符辟瘟符求子安胎符産難符却蚊虻符百解符求官符治酒醬符延年符一十二道大道神符延年益壽治病如神無他疾病服之亦吉二符益壽輕身以白素書帶之或吞服亦可延華係頭中係頭上廷壽吉亦可二符吞服長命佩之長生度厄吉還精補腦符佩之或吞服大吉佩之延年天帝神符佩之長生此符上墨書下朱書去百鬼懸門上吉辟鬼符二十八道辟鬼門上辟百鬼懸大吉厠上大吉辟鬼辟百鬼懸衣領中吉門户上吉辟百鬼佩佩之辟鬼之吉辟百鬼著牀左右安之吉二符辟百鬼懸東户上大吉二符辟鬼貼東門上吉書桃板安牀左右辟鬼書桃板安牀左右吉辟百鬼山精土地門户左右吉辟鬼書之户上辟鬼著四壁上辟鬼衣領中吉關文辟百鬼點四壁吉帳中符帳東南角悵西角帳東北角悵四角悵東方悵南方帳西方悵北方悵西比方安魂符三十三道四符安魂吞之二符強魂上書日下書耳還魂魄衣襟中大吉佩之安魂心動書之畏夜書兩手中還魂魄佩安還魂魄吞之吉上六符治驚恐吞之大吉驚恐吞之或書心上三符吞亦可佩帶之安牀頭衣中吉驚懼書五心上吉心恐衣書素衣襟中白驚書左手中心恐書右臂中驚恐書素衣襟中吉書懸卧牀及衣襟吉書牀頭吉三符并佩之吉若驚恐佩之吉吞服之吉斷惡夢符二十九道上六符恶勞書懸牀頭吉二符惡夢書絳係心前亦安牀頭大吉夜夢見鬼猒昧安枕中吉惡夢安枕中吉惡夢吞之吉惡夢貼帳前或被首大吉貼帳上狀頭左右大吉惡書戶户上吉帳四角二符惡夢吞之大吉著心前夢與鬼相見安牀頭大吉猒昏昧安牀頭大吉夢與鬼通書枕上吉寐不覺書符頭上吉惡夢書黃素二寸係胸前夜卧不安貼卧床四角吉大息吞之書心上吉大息書心上吉夜夢與鬼好見書于狀前惡夢書符門戶上吉辟瘟符五十三道辟瘟書户上右斷瘟上五符書門户上大吉帝肩甲男左女右或書眉睫吉辟瘟庭前懸吉辟瘟一人帶之百人不病大吉符係肘後辟瘟大吉帶之吉辟瘟係臂上男左女右佩之吉辟瘟書戶壁上大吉辟瘟書戶壁上大吉二符辟瘟桃板書著門兩邊或佩頭上大吉佩之殺鬼書桃板懸門戶上大吉辟瘟尸壁上辟瘟書懸門上大吉二符辟瘟帶之大吉辟瘟著耳中并書桃板井竃上吞服或佩帶之大吉辟瘟衣領中大吉利命符除瘟書桃板門戶上大吉辟瘟書貼户上大吉書批板三寸係頭中不染病吉辟瘟帶之吉斷瘟符東方大吉斷瘟符南方大吉欲入病家此一符吞之下一符帶之大吉瘟南方瘟中央瘟西方瘟北方上五符辟瘟吞之大吉求子安胎符二十八道已上十四符無子吞之吉胎不出書手中吉二符動胎吞之大吉疾病吞之至三日愈産後三日服符吉四符保胎吞之大吉妊娠轉女為男吞之大吉妊娠三月書佩兩脅下得男吞之吉妊娠三月書佩脅下得男又吞之大吉妊娠三月服符轉女為男大吉初妊娠佩之大吉無子朱書黃素以庚子日佩之大吉婦人自悲哀不樂乏兒子啼哭如狂書絳五寸係臂或安卧處大吉利産難符二十五道上八符難産吞之吉二符橫産二符子死腹中吞之衣不出書腋下吉逆産吞吉逆生燒甑帶作墨書乳下吉上三符救産墨書吞之兒持出大吉子死腹中吞之吉易産符墨書吞之兒持符出吉胞衣不出吞之大吉子死腹中朱書吞吉上三符胞衣不出吞之大吉却蚊虻符五道辟蛟虻安枕中大吉二符辟蠱及蠱毒吉二符辟百蠱毒并蟲大吉百解符二通解宅含及門戶有聲宅舍介處書符鎮之大吉門户介處書符鎮之大吉符用桑木長一尺一寸書安解處大吉求官符二十三道四符見官長吞服或佩帶大吉求官佩之見公王求事必得吉令人愛己朱書符佩之男左女右大吉見刺史求事懷之吉二符進見君王帶之大吉見官長衣領中大吉欲造作百事和合吉見貴人帶之大吉爭道理佩帶吉見令長帶之大吉求官帶之吉輔身符書白素中男左女右佩之大吉神仙護身解厄去災萬害符男左女右臂朱書係肘後大吉護身延年男左女右帶之大吉此符令人肌骨堅佩之三年坐致玉女行厨以靈砂書絳帶安心上一道背上衣裹勿令人知向外大吉仙人護身符救萬厄百病殺千鬼萬邪男左女右佩之大吉治酒搏符十道佩符行令人不醉醬臰敗書置瓮上吉著瓮中吉將此符合酒美或燒酒中吉服此符令人飲酒不醉服之飲酒不醉不醉光服此符安瓮中令酒美酒不解吞此符太上老君混元三部符卷下
